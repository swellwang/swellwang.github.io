<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户总额记录 - 云端版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cloud-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 账户总额记录</h1>
            <p class="subtitle">实时追踪您的资产状况 - 云端同步版</p>
        </header>

        <div id="authContainer" class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showLogin()">登录</button>
                <button class="auth-tab" onclick="showRegister()">注册</button>
            </div>
            
            <div id="loginForm" class="auth-form">
                <h2>欢迎回来</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="loginEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn-auth">登录</button>
                </form>
                <div class="auth-footer">
                    <p>还没有账户？<a href="#" onclick="showRegister()">立即注册</a></p>
                </div>
            </div>
            
            <div id="registerForm" class="auth-form" style="display: none;">
                <h2>创建账户</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="registerUsername" required placeholder="3-30 个字符" minlength="3" maxlength="30">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="registerEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="registerPassword" required placeholder="至少 6 位" minlength="6">
                    </div>
                    <button type="submit" class="btn-auth">注册</button>
                </form>
                <div class="auth-footer">
                    <p>已有账户？<a href="#" onclick="showLogin()">立即登录</a></p>
                </div>
            </div>
        </div>

        <div id="appContent" class="app-content" style="display: none;">
            <div class="user-bar">
                <div class="user-info">
                    <span>👤 <span id="currentUser">用户</span></span>
                    <span class="sync-status" id="syncStatus">🟢 已连接</span>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>

            <div class="total-display">
                <div class="total-label">账户总额</div>
                <div class="total-amount" id="totalAmount">¥0.00</div>
                <div class="last-updated" id="lastUpdated">最后更新：从未</div>
            </div>

            <div class="accounts-grid">
                <div class="account-card account-1">
                    <div class="account-header">
                        <div class="account-icon">🏦</div>
                        <h2>WSW</h2>
                    </div>
                    <div class="account-balance" id="account1Balance">¥0.00</div>
                    <div class="input-group">
                        <label for="account1Input">输入金额</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input 
                                type="number" 
                                id="account1Input" 
                                placeholder="0.00" 
                                step="0.01" 
                                min="0"
                            >
                        </div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">📝</span>
                            <input 
                                type="text" 
                                id="account1Note" 
                                placeholder="输入备注信息（可选）"
                            >
                        </div>
                        <button class="btn-add" onclick="addToAccount(1)">
                            <span class="btn-icon">+</span> 添加
                        </button>
                        <button class="btn-set" onclick="setAccount(1)">
                            <span class="btn-icon">⚙</span> 设置
                        </button>
                    </div>
                    <div class="account-actions">
                        <button class="btn-clear" onclick="clearAccount(1)">清空账户</button>
                    </div>
                </div>

                <div class="account-card account-2">
                    <div class="account-header">
                        <div class="account-icon">💳</div>
                        <h2>XD</h2>
                    </div>
                    <div class="account-balance" id="account2Balance">¥0.00</div>
                    <div class="input-group">
                        <label for="account2Input">输入金额</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">¥</span>
                            <input 
                                type="number" 
                                id="account2Input" 
                                placeholder="0.00" 
                                step="0.01" 
                                min="0"
                            >
                        </div>
                        <div class="input-wrapper">
                            <span class="currency-symbol">📝</span>
                            <input 
                                type="text" 
                                id="account2Note" 
                                placeholder="输入备注信息（可选）"
                            >
                        </div>
                        <button class="btn-add" onclick="addToAccount(2)">
                            <span class="btn-icon">+</span> 添加
                        </button>
                        <button class="btn-set" onclick="setAccount(2)">
                            <span class="btn-icon">⚙</span> 设置
                        </button>
                    </div>
                    <div class="account-actions">
                        <button class="btn-clear" onclick="clearAccount(2)">清空账户</button>
                    </div>
                </div>
            </div>

            <div class="transaction-history">
                <h3>📊 交易记录</h3>
                <div class="history-filters">
                    <button class="filter-btn active" onclick="filterHistory('all')">全部</button>
                    <button class="filter-btn" onclick="filterHistory('1')">WSW</button>
                    <button class="filter-btn" onclick="filterHistory('2')">XD</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">暂无交易记录</div>
                </div>
                <button class="btn-clear-history" onclick="clearHistory()">清空记录</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>正在加载...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cloud-app.js"></script>
</body>
</html>
